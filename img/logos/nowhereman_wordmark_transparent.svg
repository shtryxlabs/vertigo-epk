<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="title desc">
  <title id="title">NOWHEREMAN wordmark</title>
  <desc id="desc">Full-power psytrance wordmark for Nowhereman, Vertigo Records founder project.</desc>
  <defs>
    <radialGradient id="halo" cx="50%" cy="45%" r="58%">
      <stop offset="0%" stop-color="#D8A542" stop-opacity="0.34"/>
      <stop offset="44%" stop-color="#54358C" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#06070D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E7D4A2"/>
      <stop offset="48%" stop-color="#D8A542"/>
      <stop offset="100%" stop-color="#C8BDE6"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="#D8A542" stroke-opacity="0.52" stroke-width="2">
    <ellipse cx="800" cy="206" rx="620" ry="92"/>
    <ellipse cx="800" cy="206" rx="420" ry="62"/>
    <path d="M202 210 C410 104 602 104 800 210 C998 316 1190 316 1398 210"/>
  </g>
  <text x="800" y="242"
        text-anchor="middle"
        fill="url(#gold)"
        font-family="Space Grotesk, Sora, Arial, sans-serif"
        font-size="142"
        font-weight="700"
        letter-spacing="24">NOWHEREMAN</text>
  <text x="800" y="314"
        text-anchor="middle"
        fill="#8E84C4"
        font-family="Space Mono, monospace"
        font-size="28"
        letter-spacing="13">FULL-POWER PSYTRANCE</text>
</svg>
